<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Disaster Response Routing System</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Sidebar UI Panel -->
    <aside class="sidebar">
        <div class="header">
            <h1>Disaster Response<br>Routing System</h1>
            <button id="theme-toggle" class="theme-toggle" aria-label="Toggle Theme">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line>
                    <line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                    <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line>
                    <line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
            </button>
        </div>

        <div class="form-group">
            <label for="vehicle-select">Select Vehicle Type</label>
            <select id="vehicle-select">
                <option value="Rescue Truck" selected>Rescue Truck (Clear + Debris)</option>
                <option value="Ambulance">Ambulance (Clear Roads Only)</option>
                <option value="Bulldozer">Bulldozer (All Except Blocked)</option>
            </select>
        </div>

        <div class="form-group">
            <label for="source-input">Source Node</label>
            <input type="text" id="source-input" placeholder="Click map or type node (e.g. A)">
        </div>

        <div class="form-group">
            <label for="target-input">Destination Node</label>
            <input type="text" id="target-input" placeholder="Click map or type node (e.g. B)">
        </div>

        <!-- Separate Calculate Button as requested -->
        <button id="calc-btn" class="btn btn-primary">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 21V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16"></path><path d="M9 21v-4a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v4"></path></svg>
            Calculate Best Route
        </button>

        <button id="sim-btn" class="btn btn-danger">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20"></path><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
            Simulate Disaster
        </button>

        <!-- Output Panel -->
        <div id="output-panel" class="output-panel">
            <div class="output-item">
                <span class="output-label">Total Distance</span>
                <span id="out-distance" class="output-value">-- km</span>
            </div>
            <div class="output-item">
                <span class="output-label">Estimated Time</span>
                <span id="out-time" class="output-value">-- min</span>
            </div>
            <div class="output-item">
                <span class="output-label">Risk Score</span>
                <span id="out-risk" class="output-value">--</span>
            </div>
            <div class="output-item">
                <span class="output-label">Vehicle Compatibility</span>
                <span id="out-status" class="status-badge status-valid">Valid</span>
            </div>
        </div>
    </aside>

    <!-- Map Container -->
    <div id="map"></div>
    
    <!-- Legend -->
    <div class="legend">
        <h3>Risk Legend</h3>
        <div class="legend-item"><div class="color-box" style="background:#22c55e;"></div> Low (Clear/Safe)</div>
        <div class="legend-item"><div class="color-box" style="background:#eab308;"></div> Medium (Debris)</div>
        <div class="legend-item"><div class="color-box" style="background:#ef4444;"></div> High (Flooded/Blocked)</div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <!-- Custom JS -->
    <script src="script.js"></script>
</body>
</html>
